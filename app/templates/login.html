{% extends "base.html" %}
{% block title %}Log in — Dispatcher{% endblock %}
{% block content %}
<div class="container-narrow" style="padding-top: 1rem;">
    <h1 style="font-size: 1.6rem; margin-bottom: 0.4rem;">Log in</h1>
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">Welcome back. Your community needs you.</p>

    <div class="card form-card">
        <form method="POST">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" required>

            <label for="password">Password</label>
            <input type="password" name="password" id="password" required>

            <button type="submit" class="btn btn-primary" style="width:100%; margin-top: 1.5rem;">Log in</button>
        </form>
    </div>

    <p style="text-align:center; margin-top: 1.25rem; color: var(--text-muted); font-size: 0.88rem;">
        No account yet? <a href="{{ url_for('auth.register') }}">Sign up</a>
    </p>
</div>
{% endblock %}
