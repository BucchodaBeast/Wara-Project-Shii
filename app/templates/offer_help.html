{% extends "base.html" %}
{% block title %}Offer Help — Dispatcher{% endblock %}
{% block content %}
<div class="container-narrow" style="padding-top: 0.5rem;">
    <h1 style="font-size: 1.5rem; margin-bottom: 0.3rem;">Offer help</h1>
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">Every offer gets scored against active needs automatically.</p>

    <div class="card form-card">
        <form id="offer-form">
            <label for="resource_type">Resource type</label>
            <select name="resource_type" id="resource_type" required>
                <option value="water">Water</option>
                <option value="medical">Medical</option>
                <option value="food">Food</option>
                <option value="shelter">Shelter</option>
                <option value="transport">Transport</option>
                <option value="other">Other</option>
            </select>

            <label for="description">Describe what you can offer</label>
            <textarea name="description" id="description" rows="3" required placeholder="e.g. 20L jerrycans, 10 available"></textarea>

            <label for="quantity">Quantity</label>
            <input type="number" name="quantity" id="quantity" min="1" value="1">

            <input type="hidden" name="latitude" id="latitude">
            <input type="hidden" name="longitude" id="longitude">

            <button type="submit" class="btn btn-primary" style="width:100%; margin-top: 1.5rem;">Submit offer</button>
            <p id="form-status" style="font-size: 0.82rem; margin-top: 0.6rem; color: var(--text-muted);"></p>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition((pos) => {
        document.getElementById("latitude").value = pos.coords.latitude;
        document.getElementById("longitude").value = pos.coords.longitude;
    }, () => {}, { timeout: 4000 });
}

document.getElementById("offer-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const form = e.target;
    const statusEl = document.getElementById("form-status");
    statusEl.textContent = "Submitting...";

    const result = await submitWithOfflineFallback(form, "/api/offers");

    if (result.queued) {
        statusEl.textContent = "You're offline — saved on this device, will send automatically once reconnected.";
        statusEl.style.color = "var(--amber)";
        form.reset();
    } else {
        window.location.href = "{{ url_for('citizen.dashboard') }}";
    }
});
</script>
{% endblock %}
